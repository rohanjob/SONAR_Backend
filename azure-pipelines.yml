# =============================================
# SSP Books Backend - Azure DevOps Pipeline
# =============================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - '**'

pr:
  branches:
    include:
      - main

pool:
  name: 'ShivaRam'

variables:
  nodeVersion: '20.x'
  dockerRegistryServiceConnection: 'sspbooksacr'
  imageRepository: 'ssp-books-backend'
  containerRegistry: 'sspbooksacr.azurecr.io'
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'
  sonarQubeServiceConnection: 'SonarQube-B'
  sonarProjectKey: 'ssp_books_backend'
  sonarProjectName: 'SSP Books Backend'

stages:
  # =============================================
  # Stage 1: Build & Test
  # =============================================
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Install, Lint, Test'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: npm ci --legacy-peer-deps
            displayName: 'Install Dependencies'

          - script: npm run lint
            displayName: 'Run ESLint'
            continueOnError: true

          - script: npm test -- --reporters=default --reporters=jest-junit
            displayName: 'Run Unit Tests'
            env:
              NODE_ENV: test
              DB_HOST: localhost
              DB_PORT: 5432
              DB_NAME: ssp_books_test
              DB_USER: postgres
              DB_PASSWORD: postgres
              JWT_SECRET: test_jwt_secret

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/junit.xml'
              mergeTestResults: true
            condition: always()

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Code Coverage'
            inputs:
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml'
            condition: always()

  # =============================================
  # Stage 2: SonarQube Analysis
  # =============================================
  - stage: CodeQuality
    displayName: 'SonarQube Analysis'
    dependsOn: Build
    jobs:
      - job: SonarAnalysis
        displayName: 'Run SonarQube Scanner'
        steps:
          - checkout: self
            fetchDepth: 0

          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: npm ci --legacy-peer-deps
            displayName: 'Install Dependencies'

          - script: npm test
            displayName: 'Generate Coverage For SonarQube'
            env:
              NODE_ENV: test
              DB_HOST: localhost
              DB_PORT: 5432
              DB_NAME: ssp_books_test
              DB_USER: postgres
              DB_PASSWORD: postgres
              JWT_SECRET: test_jwt_secret

          - task: SonarQubePrepare@8
            displayName: 'Prepare SonarQube Analysis'
            inputs:
              SonarQube: 'SonarQube-B'
              scannerMode: 'CLI'
              configMode: 'manual'
              cliProjectKey: 'ssp_books_backend'
              cliProjectName: 'SSP Books Backend'
              cliSources: 'src'
              extraProperties: |
                sonar.javascript.lcov.reportPaths=coverage/lcov.info
                sonar.tests=tests
                sonar.test.inclusions=**/*.test.js
                sonar.exclusions=node_modules/**,coverage/**,tests/**
                sonar.sourceEncoding=UTF-8

          - task: Bash@3
            displayName: 'Remove branch name for Community Edition'
            inputs:
              targetType: 'inline'
              script: |
                NEW_PARAMS=$(python3 -c "import os, json; p = json.loads(os.environ.get('SONARQUBE_SCANNER_PARAMS', '{}')); p.pop('sonar.branch.name', None); print(json.dumps(p))")
                echo "##vso[task.setvariable variable=SONARQUBE_SCANNER_PARAMS]$NEW_PARAMS"

          - task: SonarQubeAnalyze@8
            displayName: 'Run SonarQube Analysis'

          - task: SonarQubePublish@8
            displayName: 'Publish SonarQube Results'
            inputs:
              pollingTimeoutSec: '300'

  # =============================================
  # Stage 3: Build Docker Image
  # =============================================
  - stage: Build
    displayName: 'Build Docker Image'
    dependsOn: CodeQuality
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildDockerImage
        displayName: 'Build Docker Image'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              repository: '$(imageRepository)'
              dockerfile: '$(dockerfilePath)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

  # =============================================
  # Stage 4: Trivy Installation
  # =============================================
  - stage: TrivyInstall
    displayName: 'Trivy Installation'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

    jobs:
      - job: InstallTrivy
        displayName: 'Install Trivy Scanner'
        steps:
          - script: |
              echo "Installing Trivy..."
              sudo apt-get install wget apt-transport-https gnupg lsb-release -y
              wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
              echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
              sudo apt-get update
              sudo apt-get install trivy -y
            displayName: 'Install Trivy'

  # =============================================
  # Stage 5: Trivy Scanner
  # =============================================
  - stage: TrivyScanner
    displayName: 'Trivy Scanner'
    dependsOn: TrivyInstall
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

    jobs:
      - job: ScanImage
        displayName: 'Scan Docker Image'
        steps:
          - script: |
              echo "Scanning Docker Image..."
              trivy image --severity HIGH,CRITICAL $(containerRegistry)/$(imageRepository):$(tag)
            displayName: 'Run Trivy Scan'

  # =============================================
  # Stage 6: Push Docker Image
  # =============================================
  - stage: Push
    displayName: 'Push Docker Image'
    dependsOn: TrivyScanner
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

    jobs:
      - job: PushDockerImage
        displayName: 'Push Docker Image'
        steps:
          - checkout: none

          - task: Docker@2
            displayName: 'Push Docker Image'
            inputs:
              command: push
              repository: '$(imageRepository)'
              containerRegistry: '$(dockerRegistryServiceConnection)'
              tags: |
                $(tag)
                latest

  # =============================================
  # Stage 7: Deploy
  # =============================================
  - stage: Deploy
    displayName: 'Deploy Backend'
    dependsOn: Push
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployApp
        displayName: 'Deploy Backend'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "========================================="
                    echo "Deploying SSP Books Backend..."
                    echo "========================================="
                    echo "Deployment completed successfully!"
                  displayName: 'Deploy to Azure VM'
